version: "3.9"

services:
  alphabet-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: alphabet-db
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Your_strong_password123"
    ports:
      - "1433:1433"
  alphabet-redis:
    image: redis:7-alpine
    container_name: alphabet-redis
    ports:
      - "6379:6379"
